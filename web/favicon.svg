<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Globe circle -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#d4a44c" stroke-width="1.8"/>
  <!-- Equator -->
  <ellipse cx="16" cy="16" rx="13" ry="5" fill="none" stroke="#d4a44c" stroke-width="1.2"/>
  <!-- Meridian vertical -->
  <ellipse cx="16" cy="16" rx="5" ry="13" fill="none" stroke="#d4a44c" stroke-width="1.2"/>
  <!-- Latitude upper -->
  <ellipse cx="16" cy="10" rx="11.5" ry="3.5" fill="none" stroke="#d4a44c" stroke-width="0.8" opacity="0.6"/>
  <!-- Latitude lower -->
  <ellipse cx="16" cy="22" rx="11.5" ry="3.5" fill="none" stroke="#d4a44c" stroke-width="0.8" opacity="0.6"/>
</svg>
